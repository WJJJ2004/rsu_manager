rt_solver_node:
  ros__parameters:
    # ==== RT initial pos seed ====
    left_q_seed: [0.0, -0.5672320]
    right_q_seed: [0.0, -0.5672320]

    left_alpha_seed: [-0.458105, 0.458105]
    right_alpha_seed: [-0.458105, 0.458105]
    # ===== Actuator ID Mapping (ID to RSU solver) =====
    left_ac1_id: 18
    left_ac2_id: 20
    right_ac1_id: 19
    right_ac2_id: 21

    # ===== joints =====
    joint_ankle_pitch: "ankle_pitch"
    joint_ankle_roll: "ankle_roll"
    joint_upper_crank: "upper_crank"
    joint_lower_crank: "lower_crank"

    hold_alpha_on_infeasible: true

    # ===== TF-based crank sanity check params =====
    world_frame: "base_link"
    tf_timeout_sec: 0.05
    tf_check_rate_hz: 30.0
    gate_publish_by_tf_check: true

    # frames
    c1_frame: "point_c1_1"
    c2_frame: "point_c2_1"
    u1_frame: "point_u1_1"
    u2_frame: "point_u2_1"

    # tolerances / limits
    len_tol_m: 0.002
    ang_min_deg: 65.0
    ang_max_deg: 115.0

    rsu_state_frame_id: "rsu_state"